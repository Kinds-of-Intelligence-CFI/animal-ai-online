<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment Complete - Animal-AI</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <script src="config.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        line-height: 1.6;
        color: #333;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 700px;
        padding: 50px 40px;
        text-align: center;
        animation: fadeIn 0.5s ease-in;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .success-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 30px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: scaleIn 0.5s ease-out 0.2s both;
      }

      @keyframes scaleIn {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }

      .success-icon svg {
        width: 50px;
        height: 50px;
        stroke: white;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        font-size: 2.5rem;
        color: #667eea;
        margin-bottom: 20px;
      }

      .subtitle {
        font-size: 1.2rem;
        color: #666;
        margin-bottom: 30px;
      }

      .message {
        text-align: left;
        margin-bottom: 30px;
        color: #555;
        line-height: 1.8;
      }

      .message p {
        margin-bottom: 15px;
      }

      .feedback-box {
        background-color: #f8f9fa;
        border-radius: 8px;
        padding: 20px;
        margin: 20px 0;
        border-left: 4px solid #667eea;
        text-align: left;
      }

      .feedback-box h3 {
        color: #667eea;
        margin-bottom: 10px;
        font-size: 1.1rem;
      }

      .feedback-box textarea {
        width: 100%;
        min-height: 100px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.95rem;
        resize: vertical;
        box-sizing: border-box;
        margin-top: 8px;
      }

      .feedback-box textarea:focus {
        outline: none;
        border-color: #667eea;
      }

      .submit-button {
        display: inline-block;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 10px 28px;
        border: none;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 12px;
        transition: opacity 0.2s;
      }

      .submit-button:hover {
        opacity: 0.9;
      }

      .submit-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .contact-info {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 2px solid #e9ecef;
      }

      .contact-info p {
        margin-bottom: 10px;
      }

      .contact-link {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }

      .contact-link:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      @media (max-width: 600px) {
        .container {
          padding: 30px 20px;
        }

        h1 {
          font-size: 2rem;
        }

        .subtitle {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h1>Thank You!</h1>

      <div class="message">
        <p>
          Thank you for participating in this Animal-AI research study. Your responses have been automatically saved and uploaded.
        </p>
      </div>

      <div class="feedback-box" id="feedback-box">
        <h3>Share your feedback</h3>
        <textarea id="feedback-text" placeholder="Please share any thoughts on your experience, or leave this blank if you have nothing to add (do not include confidential data)."></textarea>
        <br>
        <button class="submit-button" id="submit-button" onclick="submitFeedback()">Submit feedback</button>
      </div>

      <div class="contact-info">
        <p>You may now close this window.</p>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const experimentId = urlParams.get('experiment_id') || '';
      const participantId = urlParams.get('participant_id') || '';

      async function submitFeedback() {
        const button = document.getElementById('submit-button');
        const text = document.getElementById('feedback-text').value.trim();

        button.disabled = true;
        button.textContent = 'Submitting...';

        try {
          const lambdaUrl = CONFIG.LAMBDA_URL;
          const response = await fetch(lambdaUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              file_data: text || '(no feedback provided)',
              file_type: 'txt',
              experiment_id: experimentId,
              user_id: participantId
            })
          });

          const outerJson = await response.json();
          if (response.ok && outerJson.statusCode === 200) {
            document.getElementById('feedback-box').remove();
          } else {
            throw new Error('Upload failed');
          }
        } catch (error) {
          console.error('Feedback submission error:', error);
          button.disabled = false;
          button.textContent = 'Submission failed — please try again';
        }
      }
    </script>
  </body>
</html>
